{{ define "main" }}
<div class="container">
  <article class="post-single">
    <header class="post-header">
      <h1 class="post-title">{{ .Title }}</h1>
      {{ with .Description }}<p class="post-subtitle">{{ . }}</p>{{ end }}
    </header>
    <div class="post-content prose">
      {{ .Content }}
    </div>
  </article>
</div>
{{ end }}
