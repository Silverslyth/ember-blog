baseURL = "https://hugo-eight-ochre.vercel.app"
locale = "en-us"
title = "Ember"
theme = "ember"
[pagination]
  pagerSize = 8
enableRobotsTXT = true
enableEmoji = true
hasCJKLanguage = false

[params]
  author = "Gem"
  description = "A digital archive of useful knowledge — guides, workflows, and research for Linux, open-source software, streaming ecosystems, privacy, and self-hosting."
  tagline = "A digital archive of useful knowledge."
  email = ""
  # Social links (leave empty to hide)
  github = ""
  mastodon = ""
  twitter = ""
  # Donation page
  donateEnabled = true
  kofiLink = ""
  paypalLink = ""
  btcAddress = ""
  # SEO
  googleVerification = ""
  openGraphImage = "/images/og-default.svg"
  # Features
  searchEnabled = true
  darkModeToggle = true

[menu]
  [[menu.main]]
    name = "Home"
    url = "/"
    weight = 1
  [[menu.main]]
    name = "Guides"
    url = "/guides/"
    weight = 2
  [[menu.main]]
    name = "Categories"
    url = "/categories/"
    weight = 3
  [[menu.main]]
    name = "About"
    url = "/pages/about/"
    weight = 4
  [[menu.main]]
    name = "Support"
    url = "/donate/"
    weight = 5

[taxonomies]
  category = "categories"
  tag = "tags"

[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "dracula"
    lineNos = false
    codeFences = true
    guessSyntax = true

[minify]
  [minify.tdewolff]
    [minify.tdewolff.html]
      keepWhitespace = false
