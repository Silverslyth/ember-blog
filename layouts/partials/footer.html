<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-brand">
      <a href="{{ "/" | relURL }}" class="footer-logo">{{ .Site.Title }}</a>
      <p class="footer-desc">{{ .Site.Params.description }}</p>
    </div>
    <ul class="footer-links">
      {{ range .Site.Menus.main }}
        <li><a href="{{ .URL }}">{{ .Name }}</a></li>
      {{ end }}
      <li><a href="{{ "/index.xml" | relURL }}">RSS</a></li>
    </ul>
  </div>
  <div class="footer-bottom">
    <p>&copy; {{ now.Year }} {{ .Site.Params.author }} · Built with <a href="https://gohugo.io">Hugo</a></p>
  </div>
</footer>
